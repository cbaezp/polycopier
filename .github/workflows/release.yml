name: Release

on:
  # Manually triggered from the GitHub UI → Actions tab → Release → Run workflow
  # Optionally specify a tag (e.g. v1.2.3); leave blank to auto-bump the patch version.
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.2.3). Leave blank to auto-bump patch.'
        required: false
        default: ''

  # Also fires if you push a tag directly (git tag v1.2.3 && git push --tags)
  push:
    tags:
      - "v*"

concurrency:
  group: release
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: polycopier

permissions:
  contents: write

jobs:
  # -- Derive version -----------------------------------------------------------
  version:
    name: Derive version
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute release tag
        id: tag
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            # Tag push -- use the existing tag as-is.
            TAG="${GITHUB_REF#refs/tags/}"
          elif [[ -n "${{ github.event.inputs.tag }}" ]]; then
            # Manual trigger with explicit version.
            TAG="${{ github.event.inputs.tag }}"
          else
            # Manual trigger without version -- auto-bump latest patch.
            LATEST=$(git tag --list 'v*' --sort=-version:refname | head -1)
            if [[ -z "$LATEST" ]]; then
              TAG="v0.1.0"
            else
              IFS='.' read -r major minor patch <<< "${LATEST#v}"
              TAG="v${major}.${minor}.$((patch + 1))"
            fi
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Releasing as $TAG"

      - name: Create annotated tag
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

  # -- Build matrix -------------------------------------------------------------
  build:
    name: Build - ${{ matrix.target }}
    needs: version
    runs-on: ${{ matrix.os }}

    if: >-
      startsWith(github.ref, 'refs/tags/') == false ||
      github.actor != 'github-actions[bot]'

    strategy:
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            artifact: polycopier-macos-arm64

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: polycopier-linux-x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary for upload
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/${{ env.BINARY_NAME }} \
             ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          retention-days: 1

  # -- Create GitHub Release ----------------------------------------------------
  release:
    name: Create Release
    needs: [version, build]
    runs-on: ubuntu-latest

    if: >-
      startsWith(github.ref, 'refs/tags/') == false ||
      github.actor != 'github-actions[bot]'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          generate_release_notes: true
          prerelease: ${{ contains(needs.version.outputs.tag, '-') }}
          files: |
            artifacts/polycopier-macos-arm64
            artifacts/polycopier-linux-x86_64
