name: Release

on:
  push:
    branches:
      - main   # auto-release on every merge to main
    tags:
      - "v*"   # also fires if someone pushes a manual tag

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: polycopier

permissions:
  contents: write

jobs:
  # ── Derive version ─────────────────────────────────────────────────────────
  version:
    name: Derive version
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # If the trigger was a manual tag push, use that tag as-is.
      # If the trigger was a merge to main, auto-bump the patch component of
      # the latest semver tag (or start at v0.1.0 if none exists yet).
      - name: Compute release tag
        id: tag
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            LATEST=$(git tag --list 'v*' --sort=-version:refname | head -1)
            if [[ -z "$LATEST" ]]; then
              TAG="v0.1.0"
            else
              # Bump patch: v1.2.3 → v1.2.4
              IFS='.' read -r major minor patch <<< "${LATEST#v}"
              TAG="v${major}.${minor}.$((patch + 1))"
            fi
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Releasing as $TAG"

      - name: Create annotated tag
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Auto-release $TAG from main"
          git push origin "$TAG"

  # ── Build matrix ────────────────────────────────────────────────────────────
  build:
    name: Build — ${{ matrix.target }}
    needs: version
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: macos-14          # Apple Silicon (M1/M2/M3)
            target: aarch64-apple-darwin
            artifact: polycopier-macos-arm64

          - os: macos-13          # Intel Mac
            target: x86_64-apple-darwin
            artifact: polycopier-macos-x86_64

          - os: ubuntu-latest     # Linux x86_64
            target: x86_64-unknown-linux-gnu
            artifact: polycopier-linux-x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary for upload
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/${{ env.BINARY_NAME }} \
             ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          retention-days: 1

  # ── Create GitHub Release ───────────────────────────────────────────────────
  release:
    name: Create Release
    needs: [version, build]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          # Auto-generate release notes from commits since the last tag.
          generate_release_notes: true
          prerelease: ${{ contains(needs.version.outputs.tag, '-') }}
          files: |
            artifacts/polycopier-macos-arm64
            artifacts/polycopier-macos-x86_64
            artifacts/polycopier-linux-x86_64
